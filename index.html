<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Performance System - Full Cloud</title>
<style>
  :root { --primary: #1b7f2a; --danger: #dc3545; --dark: #2d3436; --light: #f9f9f9; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
  .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
  .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #636e72; }
  .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  input { padding: 12px; border: 1px solid #dfe6e9; border-radius: 6px; width: 100%; box-sizing: border-box; }
  
  button.save-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 16px; transition: 0.3s; }
  button.save-btn:hover { background: #145e1f; }
  button.save-btn:disabled { background: #ccc; cursor: not-allowed; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #f1f2f6; font-size: 13px; color: #2d3436; }
  
  .hidden { display: none; }
  .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; font-weight: bold; }
  .month-wrap { margin-top: 30px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
  .month-head { background: var(--dark); color: white; padding: 10px 15px; margin: 0; }
  .logout-btn { float: right; background: #b2bec3; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
</style>
</head>
<body>

<div id="auth-page" class="container" style="max-width: 400px; margin-top: 80px;">
  <h2 style="text-align: center; color: var(--primary);">System Login</h2>
  <input type="text" id="u-name" placeholder="Username" style="margin-bottom: 10px;">
  <input type="password" id="u-pass" placeholder="Password">
  <button class="save-btn" id="login-btn" onclick="doLogin()" style="margin-top: 15px; width: 100%;">Login to System</button>
</div>

<div id="app-page" class="container hidden">
  <button class="logout-btn" onclick="location.reload()">Logout</button>
  <h2 id="user-greet">Dashboard</h2>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('entry-tab')">Input Points</button>
    <button class="tab-btn" onclick="switchTab('report-tab')">Monthly Summary</button>
    <button id="adm-nav" class="tab-btn hidden" onclick="switchTab('adm-tab')">Manage Users</button>
  </div>

  <div id="entry-tab" class="page">
    <div class="grid">
      <input type="text" id="in-name" placeholder="Driver Name">
      <input type="text" id="in-bus" placeholder="Bus Number">
      <input type="date" id="in-date">
      <input type="number" id="in-o" placeholder="Outfit (0-10)">
      <input type="number" id="in-a" placeholder="Action (0-10)">
      <input type="number" id="in-s" placeholder="Skill (0-10)">
      <input type="number" id="in-c" placeholder="Comm (0-10)">
    </div>
    <button class="save-btn" id="save-btn-node" onclick="saveData()">Save to Cloud</button>

    <h3>Recent Activity (Live)</h3>
    <table id="activity-table">
      <thead>
        <tr>
          <th>Date</th><th>Driver</th><th>Bus</th>
          <th>O</th><th>A</th><th>S</th><th>C</th>
          <th>Total</th><th>Added By</th>
        </tr>
      </thead>
      <tbody id="recent-list"></tbody>
    </table>
  </div>

  <div id="report-tab" class="page hidden">
    <h3>Monthly Performance Summary</h3>
    <div id="driver-report-list"></div>
  </div>

  <div id="adm-tab" class="page hidden">
    <h3>System User Management</h3>
    <div class="grid">
      <input type="text" id="new-u" placeholder="New Username">
      <input type="text" id="new-p" placeholder="New Password">
      <button class="save-btn" onclick="addUser()">Create Account</button>
    </div>
    <h4 style="margin-top: 30px;">Active Cloud Users</h4>
    <table>
      <thead><tr><th>Username</th><th>Role</th><th>Password</th><th>Action</th></tr></thead>
      <tbody id="admin-user-list"></tbody>
    </table>
  </div>
</div>

<script>
let activeSession = null;

// --- 1. LOGIN ---
async function doLogin() {
  const u = document.getElementById('u-name').value;
  const p = document.getElementById('u-pass').value;
  const btn = document.getElementById('login-btn');
  
  btn.disabled = true;
  btn.innerText = "Checking Cloud...";

  try {
    const res = await fetch('/api/data?type=users');
    const db_users = await res.json();
    const user = db_users.find(x => x.username === u && x.password === p);

    if (user) {
      activeSession = { user: user.username, role: user.role };
      document.getElementById('auth-page').classList.add('hidden');
      document.getElementById('app-page').classList.remove('hidden');
      document.getElementById('user-greet').innerText = `Welcome, ${user.username}`;
      
      if (user.role === 'admin') {
          document.getElementById('adm-nav').classList.remove('hidden');
          renderAdminUserList();
      }
      renderRecent();
    } else { alert("Invalid Username or Password"); }
  } catch (e) { alert("Login failed. Check your database connection."); }
  
  btn.disabled = false;
  btn.innerText = "Login to System";
}

// --- 2. SWITCH TABS ---
function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.remove('hidden');
  event.currentTarget.classList.add('active');
  if (id === 'report-tab') renderDriverReport();
  if (id === 'adm-tab') renderAdminUserList();
}

// --- 3. SAVE DATA ---
async function saveData() {
  const btn = document.getElementById('save-btn-node');
  const entry = {
    name: document.getElementById('in-name').value.trim(),
    bus: document.getElementById('in-bus').value.trim(),
    date: document.getElementById('in-date').value,
    o: parseInt(document.getElementById('in-o').value) || 0,
    a: parseInt(document.getElementById('in-a').value) || 0,
    s: parseInt(document.getElementById('in-s').value) || 0,
    c: parseInt(document.getElementById('in-c').value) || 0,
    by: activeSession.user
  };

  if(!entry.name || !entry.date) return alert("Missing Driver Name or Date");

  btn.disabled = true;
  btn.innerText = "Saving to Neon...";

  try {
    const res = await fetch('/api/data', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry)
    });

    if (res.ok) {
      await renderRecent();
      ['in-name','in-bus','in-o','in-a','in-s','in-c'].forEach(id => document.getElementById(id).value = "");
    }
  } catch (e) { alert("Cloud Save Failed"); }
  
  btn.disabled = false;
  btn.innerText = "Save to Cloud";
}

// --- 4. LOAD RECENT ---
async function renderRecent() {
  const list = document.getElementById('recent-list');
  try {
    const res = await fetch('/api/data');
    const data = await res.json();
    list.innerHTML = "";
    data.forEach(r => {
      const total = r.points_o + r.points_a + r.points_s + r.points_c;
      const cleanDate = r.entry_date ? r.entry_date.split('T')[0] : 'N/A';
      list.innerHTML += `<tr>
        <td>${cleanDate}</td><td>${r.driver_name}</td><td><strong>${r.bus_number}</strong></td>
        <td>${r.points_o}</td><td>${r.points_a}</td><td>${r.points_s}</td><td>${r.points_c}</td>
        <td><span class="status-tag">${total}</span></td><td>${r.created_by}</td>
      </tr>`;
    });
  } catch (e) { console.error("Load error"); }
}

// --- 5. ADMIN USER MGMT ---
async function addUser() {
  const u = document.getElementById('new-u').value.trim();
  const p = document.getElementById('new-p').value.trim();
  if(!u || !p) return alert("Username/Password cannot be empty");

  try {
    const res = await fetch('/api/data?type=users', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ u, p })
    });
    if (res.ok) {
      alert("New User Added to Cloud!");
      renderAdminUserList();
      document.getElementById('new-u').value = "";
      document.getElementById('new-p').value = "";
    }
  } catch (e) { alert("Failed to add user"); }
}

async function renderAdminUserList() {
    const list = document.getElementById('admin-user-list');
    try {
      const res = await fetch('/api/data?type=users');
      const users = await res.json();
      list.innerHTML = "";
      users.forEach((u) => {
          list.innerHTML += `<tr>
              <td>${u.username}</td><td>${u.role}</td>
              <td>${u.role === 'admin' ? '******' : u.password}</td>
              <td>${u.role !== 'admin' ? 'Staff' : 'Master'}</td>
          </tr>`;
      });
    } catch (e) { console.error("User load error"); }
}

// --- 6. MONTHLY REPORTS ---
async function renderDriverReport() {
  const container = document.getElementById('driver-report-list');
  container.innerHTML = "Processing data...";
  
  try {
    const res = await fetch('/api/data');
    const cloudData = await res.json();
    container.innerHTML = "";

    const months = cloudData.reduce((acc, r) => {
      const m = r.entry_date ? r.entry_date.substring(0, 7) : 'Unknown';
      if (!acc[m]) acc[m] = [];
      acc[m].push(r);
      return acc;
    }, {});

    for (let m in months) {
      const driverTotals = months[m].reduce((acc, r) => {
        if (!acc[r.driver_name]) acc[r.driver_name] = { o:0, a:0, s:0, c:0, buses: new Set() };
        acc[r.driver_name].o += r.points_o; 
        acc[r.driver_name].a += r.points_a; 
        acc[r.driver_name].s += r.points_s; 
        acc[r.driver_name].c += r.points_c;
        if(r.bus_number) acc[r.driver_name].buses.add(r.bus_number);
        return acc;
      }, {});

      let html = `<div class="month-wrap"><h4 class="month-head">Month: ${m}</h4><table>
        <thead><tr><th>Driver</th><th>Buses</th><th>O</th><th>A</th><th>S</th><th>C</th><th>Total</th></tr></thead><tbody>`;
      for (let name in driverTotals) {
        const d = driverTotals[name];
        html += `<tr>
          <td><strong>${name}</strong></td>
          <td><small>${Array.from(d.buses).join(', ') || '—'}</small></td>
          <td>${d.o}</td><td>${d.a}</td><td>${d.s}</td><td>${d.c}</td>
          <td style="color:var(--primary); font-weight:bold">${d.o+d.a+d.s+d.c}</td>
        </tr>`;
      }
      html += `</tbody></table></div>`;
      container.innerHTML += html;
    }
  } catch (e) { container.innerHTML = "Error loading report."; }
}
</script>
</body>
</html>
