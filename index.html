<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Driver Performance System</title>
<style>
  :root { --primary: #1b7f2a; --danger: #dc3545; --dark: #2d3436; --light: #f9f9f9; }
  body { font-family: 'Segoe UI', sans-serif; background: var(--light); margin: 0; padding: 20px; }
  .container { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
  
  .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; }
  .tab-btn { padding: 12px 20px; cursor: pointer; border: none; background: none; font-weight: bold; color: #636e72; }
  .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; }
  input { padding: 12px; border: 1px solid #dfe6e9; border-radius: 6px; width: 100%; box-sizing: border-box; }
  .limit-note { font-size: 11px; color: #d63031; margin-top: -15px; margin-bottom: 15px; display: block; }
  
  button.save-btn { background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; cursor: pointer; font-size: 16px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 10px; background: white; }
  th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
  th { background: #f1f2f6; font-size: 13px; color: #2d3436; }
  
  .hidden { display: none; }
  .logout-btn { float: right; background: #b2bec3; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
  .status-tag { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: #e8f5e9; color: #2e7d32; font-weight: bold; }
  .month-wrap { margin-top: 30px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
  .month-head { background: var(--dark); color: white; padding: 10px 15px; margin: 0; }
</style>
</head>
<body>

<div id="auth-page" class="container" style="max-width: 400px; margin-top: 80px;">
  <h2 style="text-align: center; color: var(--primary);">System Login</h2>
  <input type="text" id="u-name" placeholder="Username" style="margin-bottom: 10px;">
  <input type="password" id="u-pass" placeholder="Password">
  <button class="save-btn" onclick="doLogin()" style="margin-top: 15px;">Login</button>
</div>

<div id="app-page" class="container hidden">
  <button class="logout-btn" onclick="location.reload()">Logout</button>
  <h2 id="user-greet">Dashboard</h2>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('entry-tab')">Input Points</button>
    <button class="tab-btn" onclick="switchTab('report-tab')">Driver Monthly Summary</button>
    <button id="adm-nav" class="tab-btn hidden" onclick="switchTab('adm-tab')">Manage Users</button>
  </div>

  <div id="entry-tab" class="page">
    <div class="grid">
      <input type="text" id="in-name" placeholder="Driver Name">
      <input type="text" id="in-bus" placeholder="Bus Number">
      <input type="date" id="in-date">
      <input type="number" id="in-o" placeholder="Outfit (0-10)" min="0" max="10">
      <input type="number" id="in-a" placeholder="Action (0-10)" min="0" max="10">
      <input type="number" id="in-s" placeholder="Skill (0-10)" min="0" max="10">
      <input type="number" id="in-c" placeholder="Comm (0-10)" min="0" max="10">
    </div>
    <span class="limit-note">* Maximum allowed per category is 10 points.</span>
    <button class="save-btn" onclick="saveData()">Save Entry</button>

    <h3>Detailed Recent Activity</h3>
    <table>
      <thead>
        <tr>
          <th>Date</th><th>Driver</th><th>Bus</th>
          <th>O</th><th>A</th><th>S</th><th>C</th>
          <th>Total</th><th>User</th><th>Action</th>
        </tr>
      </thead>
      <tbody id="recent-list"></tbody>
    </table>
  </div>

  <div id="report-tab" class="page hidden">
    <h3>Monthly Totals by Driver Name</h3>
    <div id="driver-report-list"></div>
  </div>

  <div id="adm-tab" class="page hidden">
    <h3>User Management</h3>
    <div class="grid">
      <input type="text" id="new-u" placeholder="New Username">
      <input type="text" id="new-p" placeholder="New Password">
      <button class="save-btn" onclick="addUser()">Create Staff Account</button>
    </div>
    <h4 style="margin-top: 30px;">Active System Users</h4>
    <table id="user-mgmt-table">
      <thead><tr><th>Username</th><th>Role</th><th>Password</th><th>Action</th></tr></thead>
      <tbody id="admin-user-list"></tbody>
    </table>
  </div>
</div>

<script>
let db_users = JSON.parse(localStorage.getItem("bus_users")) || [{user: "admin", pass: "Cambolink21@123", role: "admin"}];
let db_data = JSON.parse(localStorage.getItem("bus_data")) || [];
let activeSession = null;

function doLogin() {
  const u = document.getElementById('u-name').value;
  const p = document.getElementById('u-pass').value;
  const user = db_users.find(x => x.user === u && x.pass === p);
  if (user) {
    activeSession = user;
    document.getElementById('auth-page').classList.add('hidden');
    document.getElementById('app-page').classList.remove('hidden');
    document.getElementById('user-greet').innerText = `Welcome, ${user.user}`;
    if (user.role === 'admin') {
        document.getElementById('adm-nav').classList.remove('hidden');
        renderAdminUserList();
    }
    renderRecent();
  } else { alert("Invalid Credentials"); }
}

function switchTab(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.remove('hidden');
  event.currentTarget.classList.add('active');
  if (id === 'report-tab') renderDriverReport();
}

function saveData() {
  const o = parseInt(document.getElementById('in-o').value) || 0;
  const a = parseInt(document.getElementById('in-a').value) || 0;
  const s = parseInt(document.getElementById('in-s').value) || 0;
  const c = parseInt(document.getElementById('in-c').value) || 0;

  if (o > 10 || a > 10 || s > 10 || c > 10) return alert("Limit is 10 points!");

  const entry = {
    id: Date.now(),
    name: document.getElementById('in-name').value.trim(),
    bus: document.getElementById('in-bus').value.trim(),
    date: document.getElementById('in-date').value,
    o, a, s, c,
    by: activeSession.user
  };

  if(!entry.name || !entry.date) return alert("Driver Name and Date required");
  db_data.push(entry);
  localStorage.setItem("bus_data", JSON.stringify(db_data));
  renderRecent();
  ['in-name','in-bus','in-o','in-a','in-s','in-c'].forEach(id => document.getElementById(id).value = "");
}

function renderRecent() {
  const list = document.getElementById('recent-list');
  list.innerHTML = "";
  [...db_data].reverse().slice(0,10).forEach(r => {
    const total = r.o + r.a + r.s + r.c;
    list.innerHTML += `<tr>
      <td>${r.date}</td><td>${r.name}</td><td><strong>${r.bus}</strong></td>
      <td>${r.o}</td><td>${r.a}</td><td>${r.s}</td><td>${r.c}</td>
      <td><span class="status-tag">${total}</span></td><td>${r.by}</td>
      <td>${activeSession.role === 'admin' ? `<button onclick="delEntry(${r.id})" style="color:var(--danger);border:none;background:none;cursor:pointer">Delete</button>` : '—'}</td>
    </tr>`;
  });
}

function renderDriverReport() {
  const container = document.getElementById('driver-report-list');
  container.innerHTML = "";
  const months = db_data.reduce((acc, r) => {
    const m = r.date.substring(0, 7);
    if (!acc[m]) acc[m] = [];
    acc[m].push(r);
    return acc;
  }, {});

  for (let m in months) {
    const driverTotals = months[m].reduce((acc, r) => {
      if (!acc[r.name]) acc[r.name] = { o:0, a:0, s:0, c:0, buses: new Set() };
      acc[r.name].o += r.o; acc[r.name].a += r.a; acc[r.name].s += r.s; acc[r.name].c += r.c;
      if(r.bus) acc[r.name].buses.add(r.bus);
      return acc;
    }, {});

    let html = `<div class="month-wrap"><h4 class="month-head">Month: ${m}</h4><table>
      <tr><th>Driver Name</th><th>Bus Numbers Used</th><th>O</th><th>A</th><th>S</th><th>C</th><th>Total Points</th></tr>`;
    for (let name in driverTotals) {
      const d = driverTotals[name];
      const total = d.o+d.a+d.s+d.c;
      html += `<tr>
        <td><strong>${name}</strong></td>
        <td><small>${Array.from(d.buses).join(', ') || 'N/A'}</small></td>
        <td>${d.o}</td><td>${d.a}</td><td>${d.s}</td><td>${d.c}</td>
        <td style="color:var(--primary); font-weight:bold">${total}</td>
      </tr>`;
    }
    html += `</table></div>`;
    container.innerHTML += html;
  }
}

function renderAdminUserList() {
    const list = document.getElementById('admin-user-list');
    list.innerHTML = "";
    db_users.forEach((u, index) => {
        list.innerHTML += `<tr>
            <td>${u.user}</td><td>${u.role}</td>
            <td>${u.user === 'admin' ? '******' : u.pass}</td>
            <td>${u.user !== 'admin' ? `<button onclick="delUser(${index})" style="color:var(--danger); border:none; background:none; cursor:pointer;">Delete</button>` : 'System Master'}</td>
        </tr>`;
    });
}

function addUser() {
  const u = document.getElementById('new-u').value.trim();
  const p = document.getElementById('new-p').value.trim();
  if(!u || !p) return alert("Fill all fields");
  if(db_users.find(x => x.user === u)) return alert("User exists");
  db_users.push({user: u, pass: p, role: "staff"});
  localStorage.setItem("bus_users", JSON.stringify(db_users));
  document.getElementById('new-u').value = ""; document.getElementById('new-p').value = "";
  renderAdminUserList();
}

function delUser(idx) {
    if(confirm("Delete staff account?")) { db_users.splice(idx, 1); localStorage.setItem("bus_users", JSON.stringify(db_users)); renderAdminUserList(); }
}

function delEntry(id) {
  if(confirm("Delete record?")) { db_data = db_data.filter(x => x.id !== id); localStorage.setItem("bus_data", JSON.stringify(db_data)); renderRecent(); }
}
</script>
</body>
</html>
