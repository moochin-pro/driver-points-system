<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Rating</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-emerald-50/30 min-h-screen py-8 px-4 font-sans text-gray-900">

    <!-- Language Switcher -->
    <div class="max-w-md mx-auto mb-4 flex justify-end gap-2">
        <button onclick="setLanguage('en')" class="lang-btn active px-3 py-1 text-xs font-bold border border-emerald-200 rounded-full bg-white transition-all hover:border-emerald-500" data-lang="en">EN</button>
        <button onclick="setLanguage('zh')" class="lang-btn px-3 py-1 text-xs font-bold border border-emerald-200 rounded-full bg-white transition-all hover:border-emerald-500" data-lang="zh">中文</button>
        <button onclick="setLanguage('km')" class="lang-btn px-3 py-1 text-xs font-bold border border-emerald-200 rounded-full bg-white transition-all hover:border-emerald-500" data-lang="km">ភាសាខ្មែរ</button>
    </div>

    <!-- MAIN CONTAINER -->
    <div class="max-w-md mx-auto bg-white rounded-3xl shadow-xl shadow-emerald-900/5 border border-emerald-100 overflow-hidden min-h-[500px] flex flex-col relative">
        
        <!-- STEP 1: WELCOME PAGE -->
        <div id="step-welcome" class="flex-1 flex flex-col p-8 text-center animate-slide-in justify-center">
            <div class="mb-4">
                <!-- LOGO ONLY -->
                <div class="brand-logo-container">
                    <img 
                        id="welcome-logo" 
                        src="assets/logo.png" 
                        alt="Company Logo"
                        class="w-full h-full object-contain"
                    >
                </div>
            </div>

            <div class="space-y-4 mb-4">
                <button onclick="showStep('step-scan')" class="w-full flex items-center justify-between p-4 border-2 border-emerald-100 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 transition-all group">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center mr-4 group-hover:bg-white transition-all">
                            <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"></path>
                            </svg>
                        </div>
                        <div class="text-left">
                            <span id="txt-btn-scan" class="block font-bold text-emerald-900">Scan QR Code</span>
                            <span id="txt-btn-scan-desc" class="text-xs text-gray-400">Scan the sticker in the vehicle</span>
                        </div>
                    </div>
                </button>

                <button onclick="showStep('step-manual')" class="w-full flex items-center justify-between p-4 border-2 border-emerald-100 rounded-2xl hover:border-emerald-500 hover:bg-emerald-50 transition-all group">
                    <div class="flex items-center">
                        <div class="w-12 h-12 bg-emerald-50 rounded-xl flex items-center justify-center mr-4 group-hover:bg-white transition-all">
                            <svg class="w-6 h-6 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                            </svg>
                        </div>
                        <div class="text-left">
                            <span id="txt-btn-manual" class="block font-bold text-emerald-900">Manual Entry</span>
                            <span id="txt-btn-manual-desc" class="text-xs text-gray-400">Type the plate number</span>
                        </div>
                    </div>
                </button>
            </div>

            <!-- Admin Login Link -->
            <div class="mt-4">
                <button onclick="window.location.href='user-login.html'" class="text-[10px] font-bold text-emerald-600/50 hover:text-emerald-600 uppercase tracking-widest transition-colors py-2 px-4 rounded-lg">
                  Login
                </button>
            </div>
        </div>
        <!-- STEP 2: SCAN QR PAGE -->
        <div id="step-scan" class="hidden flex-1 flex flex-col p-8 text-center animate-slide-in">
            <button onclick="showStep('step-welcome')" class="self-start text-emerald-600 font-bold text-sm mb-6 flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                Back
            </button>
            <h2 id="txt-scan-title" class="text-xl font-bold mb-6 text-emerald-900">Position QR inside frame</h2>
            <div class="relative w-full aspect-square max-w-[250px] mx-auto bg-gray-900 rounded-3xl overflow-hidden mb-8">
                <div class="scan-line"></div>
                <div class="absolute inset-0 flex items-center justify-center opacity-30">
                    <svg class="w-20 h-20 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path></svg>
                </div>
            </div>
            <button onclick="handleSuccessfulIdentification('QR-9902')" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg">
                Simulate Successful Scan
            </button>
        </div>

        <!-- STEP 3: MANUAL ENTRY PAGE -->
        <div id="step-manual" class="hidden flex-1 flex flex-col p-8 animate-slide-in">
            <button onclick="showStep('step-welcome')" class="self-start text-emerald-600 font-bold text-sm mb-6 flex items-center">
                <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>
                Back
            </button>
            <h2 id="txt-manual-title" class="text-xl font-bold mb-4 text-center text-emerald-900">Enter Plate Number</h2>
            <div class="space-y-6">
                <div>
                    <input type="text" id="plate-input" placeholder="e.g. ABC-1234" class="w-full text-center text-2xl font-bold p-4 bg-gray-50 border-2 border-emerald-100 rounded-2xl focus:border-emerald-500 outline-none uppercase font-mono">
                </div>
                <button onclick="handleSuccessfulIdentification(document.getElementById('plate-input').value)" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl shadow-lg">
                    Find Driver
                </button>
            </div>
        </div>

        <!-- STEP 4: RATING FORM -->
        <div id="step-rating" class="hidden flex-col">
            <div class="bg-emerald-900 p-8 text-white text-center">
                <div class="w-16 h-16 bg-emerald-800 rounded-full mx-auto mb-4 flex items-center justify-center overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=DR&background=10b981&color=fff&size=64" alt="Driver" class="w-full h-full">
                </div>
                <h1 id="txt-title" class="text-xl font-bold tracking-tight">Rate Your Driver</h1>
                <div class="mt-2">
                    <span id="active-plate" class="plate-badge text-xs">---</span>
                </div>
            </div>

            <form id="ratingForm" class="p-6 space-y-4">
                <div class="space-y-3">
                    <div class="rating-group bg-gray-50 p-3 rounded-xl"><p id="txt-q1" class="font-semibold text-xs mb-1 text-gray-700">1. Driver Punctuality</p><div class="star-rating"><input type="radio" id="q1-5" name="q1" value="5"><label for="q1-5">★</label><input type="radio" id="q1-4" name="q1" value="4"><label for="q1-4">★</label><input type="radio" id="q1-3" name="q1" value="3"><label for="q1-3">★</label><input type="radio" id="q1-2" name="q1" value="2"><label for="q1-2">★</label><input type="radio" id="q1-1" name="q1" value="1"><label for="q1-1">★</label></div></div>
                    <div class="rating-group bg-gray-50 p-3 rounded-xl"><p id="txt-q2" class="font-semibold text-xs mb-1 text-gray-700">2. Vehicle Cleanliness</p><div class="star-rating"><input type="radio" id="q2-5" name="q2" value="5"><label for="q2-5">★</label><input type="radio" id="q2-4" name="q2" value="4"><label for="q2-4">★</label><input type="radio" id="q2-3" name="q2" value="3"><label for="q2-3">★</label><input type="radio" id="q2-2" name="q2" value="2"><label for="q2-2">★</label><input type="radio" id="q2-1" name="q2" value="1"><label for="q2-1">★</label></div></div>
                    <div class="rating-group bg-gray-50 p-3 rounded-xl"><p id="txt-q3" class="font-semibold text-xs mb-1 text-gray-700">3. Driving Safety & Speed</p><div class="star-rating"><input type="radio" id="q3-5" name="q3" value="5"><label for="q3-5">★</label><input type="radio" id="q3-4" name="q3" value="4"><label for="q3-4">★</label><input type="radio" id="q3-3" name="q3" value="3"><label for="q3-3">★</label><input type="radio" id="q3-2" name="q3" value="2"><label for="q3-2">★</label><input type="radio" id="q3-1" name="q3" value="1"><label for="q3-1">★</label></div></div>
                    <div class="rating-group bg-gray-50 p-3 rounded-xl"><p id="txt-q4" class="font-semibold text-xs mb-1 text-gray-700">4. Route Knowledge</p><div class="star-rating"><input type="radio" id="q4-5" name="q4" value="5"><label for="q4-5">★</label><input type="radio" id="q4-4" name="q4" value="4"><label for="q4-4">★</label><input type="radio" id="q4-3" name="q4" value="3"><label for="q4-3">★</label><input type="radio" id="q4-2" name="q4" value="2"><label for="q4-2">★</label><input type="radio" id="q4-1" name="q4" value="1"><label for="q4-1">★</label></div></div>
                    <div class="rating-group bg-gray-50 p-3 rounded-xl"><p id="txt-q5" class="font-semibold text-xs mb-1 text-gray-700">5. Professionalism/Courteousness</p><div class="star-rating"><input type="radio" id="q5-5" name="q5" value="5"><label for="q5-5">★</label><input type="radio" id="q5-4" name="q5" value="4"><label for="q5-4">★</label><input type="radio" id="q5-3" name="q5" value="3"><label for="q5-3">★</label><input type="radio" id="q5-2" name="q5" value="2"><label for="q5-2">★</label><input type="radio" id="q5-1" name="q5" value="1"><label for="q5-1">★</label></div></div>
                    <div class="rating-group bg-gray-50 p-3 rounded-xl"><p id="txt-q6" class="font-semibold text-xs mb-1 text-gray-700">6. Overall Satisfaction</p><div class="star-rating"><input type="radio" id="q6-5" name="q6" value="5"><label for="q6-5">★</label><input type="radio" id="q6-4" name="q6" value="4"><label for="q6-4">★</label><input type="radio" id="q6-3" name="q6" value="3"><label for="q6-3">★</label><input type="radio" id="q6-2" name="q6" value="2"><label for="q6-2">★</label><input type="radio" id="q6-1" name="q6" value="1"><label for="q6-1">★</label></div></div>
                </div>
                <div class="pt-2">
                    <textarea id="comments" rows="2" placeholder="Tell us more..." class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-emerald-500 focus:outline-none transition-all text-sm"></textarea>
                </div>
                <button type="submit" id="txt-btn-submit" class="w-full py-4 bg-emerald-600 text-white font-bold rounded-xl hover:bg-emerald-700 active:scale-[0.98] transition-all shadow-lg">Submit Rating</button>
            </form>
        </div>

        <!-- STEP 5: SUCCESS -->
        <div id="successMessage" class="hidden flex-1 flex flex-col items-center justify-center p-10 text-center animate-slide-in">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 id="txt-success-title" class="text-2xl font-bold mb-2 text-emerald-900">Feedback Received!</h2>
            <p id="txt-success-body" class="text-gray-500 mb-8">Thank you for your rating.</p>
            <button onclick="location.reload()" id="txt-btn-again" class="inline-flex items-center text-emerald-700 font-semibold hover:text-emerald-800 transition-colors">Back Home</button>
        </div>
    </div>
        <link rel="stylesheet" href="css/style.css">
        <script src="js/lang.js"></script>
</body>
</html>
